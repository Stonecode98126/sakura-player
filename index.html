<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakura Player 3D</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: white;
    }
    #three-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .ui {
      position: fixed;
      z-index: 10;
      pointer-events: none;
    }
    .ui > * { pointer-events: auto; }

    .controls {
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding: 18px 30px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    button, label {
      background: none;
      border: 2px solid white;
      color: white;
      padding: 9px 18px;
      border-radius: 22px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      white-space: nowrap;
    }
    button:hover, label:hover {
      background: white;
      color: black;
    }
    select {
      background: rgba(0,0,0,0.5);
      color: white;
      border: 1px solid white;
      padding: 7px 14px;
      border-radius: 15px;
      outline: none;
    }
    select option { background: #222; color: white; }
    input[type="file"] { display: none; }

    .info {
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      font-size: 1rem;
      max-width: 80vw;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hint {
      top: 25px;
      right: 25px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
      max-width: 220px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .hint kbd {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <canvas id="three-canvas"></canvas>

  <div class="ui info" id="track-name">等待播放… 拖入 MP3 或選擇檔案</div>

  <div class="ui hint">
    🖱️ 拖曳旋轉視角<br>
    🎯 滾輪縮放<br>
    <kbd>Space</kbd> 播放／暫停<br>
    <kbd>R</kbd> 重置視角<br>
    <kbd>A</kbd> 自動旋轉
  </div>

  <div class="ui controls">
    <label for="audio-upload">選擇 MP3</label>
    <input type="file" id="audio-upload" accept="audio/*" />
    <button id="play-btn">播放／暫停</button>
    <select id="shape-select">
      <option value="cylinder">圓柱陣列</option>
      <option value="sphere">球面爆射</option>
      <option value="tunnel">頻譜隧道</option>
      <option value="helix">DNA 螺旋</option>
    </select>
    <button id="auto-rotate-btn">自動旋轉：開</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const trackName = document.getElementById('track-name');
    const audioUpload = document.getElementById('audio-upload');
    const playBtn = document.getElementById('play-btn');
    const shapeSelect = document.getElementById('shape-select');
    const autoRotateBtn = document.getElementById('auto-rotate-btn');

    // ===== Three.js 初始化 =====
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 1);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.012);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const initialCameraPos = new THREE.Vector3(0, 30, 90);
    camera.position.copy(initialCameraPos);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.minDistance = 30;
    controls.maxDistance = 250;

    // 環境光 + 平行光
    scene.add(new THREE.AmbientLight(0x404060, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 80, 30);
    scene.add(dirLight);

    // 中央律動光源（依音樂變色變強）
    const centerLight = new THREE.PointLight(0xff77aa, 1, 120);
    centerLight.position.set(0, 0, 0);
    scene.add(centerLight);

    // ===== 4 種視覺模式 =====
    const NUM_BARS = 96;
    const groups = {};

    // 1) 圓柱陣列 — 環形排列的長方體
    function buildCylinder() {
      const grp = new THREE.Group();
      const geom = new THREE.BoxGeometry(1.2, 1, 1.2);
      for (let i = 0; i < NUM_BARS; i++) {
        const angle = (i / NUM_BARS) * Math.PI * 2;
        const radius = 35;
        const hue = i / NUM_BARS;
        const mat = new THREE.MeshPhongMaterial({
          color: new THREE.Color().setHSL(hue * 0.85, 0.9, 0.5),
          emissive: new THREE.Color().setHSL(hue * 0.85, 0.9, 0.2),
          shininess: 80
        });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
        mesh.userData = { angle, baseHue: hue };
        grp.add(mesh);
      }
      return grp;
    }

    // 2) 球面爆射 — 從球心朝外延伸的線條
    function buildSphere() {
      const grp = new THREE.Group();
      const geom = new THREE.BoxGeometry(0.8, 1, 0.8);
      for (let i = 0; i < NUM_BARS; i++) {
        // Fibonacci 球面分布
        const phi = Math.acos(1 - 2 * (i + 0.5) / NUM_BARS);
        const theta = Math.PI * (1 + Math.sqrt(5)) * i;
        const dir = new THREE.Vector3(
          Math.cos(theta) * Math.sin(phi),
          Math.sin(theta) * Math.sin(phi),
          Math.cos(phi)
        );
        const hue = i / NUM_BARS;
        const mat = new THREE.MeshPhongMaterial({
          color: new THREE.Color().setHSL(hue * 0.85, 0.9, 0.55),
          emissive: new THREE.Color().setHSL(hue * 0.85, 0.9, 0.25)
        });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.userData = { dir, baseHue: hue };
        grp.add(mesh);
      }
      return grp;
    }

    // 3) 頻譜隧道 — 沿 Z 軸排列多個圓環，攝影機穿越感
    function buildTunnel() {
      const grp = new THREE.Group();
      const RINGS = 12;
      const geom = new THREE.BoxGeometry(0.7, 1, 0.7);
      for (let r = 0; r < RINGS; r++) {
        for (let i = 0; i < NUM_BARS / 2; i++) {
          const angle = (i / (NUM_BARS / 2)) * Math.PI * 2;
          const radius = 25;
          const z = -r * 12 + 30;
          const hue = (i / (NUM_BARS / 2) + r * 0.05) % 1;
          const mat = new THREE.MeshPhongMaterial({
            color: new THREE.Color().setHSL(hue * 0.85, 0.9, 0.55),
            emissive: new THREE.Color().setHSL(hue * 0.85, 0.9, 0.2),
            transparent: true,
            opacity: 1 - r * 0.05
          });
          const mesh = new THREE.Mesh(geom, mat);
          mesh.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, z);
          mesh.userData = { angle, ring: r, baseHue: hue, baseIdx: i };
          grp.add(mesh);
        }
      }
      return grp;
    }

    // 4) DNA 螺旋 — 雙螺旋結構
    function buildHelix() {
      const grp = new THREE.Group();
      const geom = new THREE.SphereGeometry(0.8, 12, 12);
      for (let i = 0; i < NUM_BARS; i++) {
        const t = i / NUM_BARS;
        const angle = t * Math.PI * 8;
        const y = (t - 0.5) * 60;
        const radius = 18;
        const hue = t;

        // 兩條螺旋：strand 0 / strand 1
        for (let s = 0; s < 2; s++) {
          const offset = s * Math.PI;
          const mat = new THREE.MeshPhongMaterial({
            color: new THREE.Color().setHSL((hue + s * 0.5) * 0.85, 0.9, 0.55),
            emissive: new THREE.Color().setHSL((hue + s * 0.5) * 0.85, 0.9, 0.25)
          });
          const mesh = new THREE.Mesh(geom, mat);
          mesh.position.set(
            Math.cos(angle + offset) * radius,
            y,
            Math.sin(angle + offset) * radius
          );
          mesh.userData = { idx: i, strand: s, baseHue: hue, angle, y, radius, offset };
          grp.add(mesh);
        }
      }
      return grp;
    }

    groups.cylinder = buildCylinder();
    groups.sphere   = buildSphere();
    groups.tunnel   = buildTunnel();
    groups.helix    = buildHelix();

    let currentMode = 'cylinder';
    scene.add(groups[currentMode]);

    function switchMode(mode) {
      scene.remove(groups[currentMode]);
      currentMode = mode;
      scene.add(groups[currentMode]);
    }

    shapeSelect.addEventListener('change', () => switchMode(shapeSelect.value));

    // 自動旋轉切換
    autoRotateBtn.addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      autoRotateBtn.textContent = `自動旋轉：${controls.autoRotate ? '開' : '關'}`;
    });

    // ===== 音訊 =====
    let audioCtx, analyser, source, dataArray;
    const audio = new Audio();
    audio.crossOrigin = 'anonymous';

    function setupAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
      analyser.fftSize = 256;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    audioUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      audio.src = URL.createObjectURL(file);
      trackName.textContent = '正在播放: ' + file.name;
      setupAudio();
      audio.play();
    });

    playBtn.addEventListener('click', () => {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      if (audio.paused) audio.play();
      else audio.pause();
    });

    // 拖放支援
    window.addEventListener('dragover', e => e.preventDefault());
    window.addEventListener('drop', (e) => {
      e.preventDefault();
      const files = Array.from(e.dataTransfer.files || []);
      const audioFile = files.find(f => f.type.startsWith('audio/'));
      if (audioFile) {
        audio.src = URL.createObjectURL(audioFile);
        trackName.textContent = '正在播放: ' + audioFile.name;
        setupAudio();
        audio.play();
      }
    });

    // ===== 動畫迴圈 =====
    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      let bassPulse = 0;
      let avgVol = 0;
      if (analyser && dataArray) {
        analyser.getByteFrequencyData(dataArray);

        // 低音脈衝
        const bassEnd = Math.floor(dataArray.length / 8);
        let bassSum = 0;
        for (let i = 0; i < bassEnd; i++) bassSum += dataArray[i];
        bassPulse = (bassSum / bassEnd) / 255;

        let volSum = 0;
        for (let i = 0; i < dataArray.length; i++) volSum += dataArray[i];
        avgVol = volSum / dataArray.length / 255;

        // 找最大值索引
        let maxIdx = 0, maxVal = 0;
        for (let i = 0; i < dataArray.length; i++) {
          if (dataArray[i] > maxVal) { maxVal = dataArray[i]; maxIdx = i; }
        }

        // 更新當前模式的物件
        const grp = groups[currentMode];
        const t = performance.now() * 0.001;

        if (currentMode === 'cylinder') {
          grp.children.forEach((mesh, i) => {
            const v = dataArray[i % dataArray.length] / 255;
            const h = 1 + v * 30;
            mesh.scale.y = h;
            mesh.position.y = h / 2 - 0.5;
            // 最大頻段高亮
            const isPeak = (i % dataArray.length) === maxIdx && maxVal > 30;
            mesh.material.emissiveIntensity = isPeak ? 1.5 : 0.5 + v;
            mesh.material.color.setHSL(mesh.userData.baseHue * 0.85, 0.9, 0.4 + v * 0.3);
          });
          grp.rotation.y += 0.003;
        }
        else if (currentMode === 'sphere') {
          grp.children.forEach((mesh, i) => {
            const v = dataArray[i % dataArray.length] / 255;
            const len = 12 + v * 35;
            mesh.position.copy(mesh.userData.dir).multiplyScalar(len * 0.5);
            mesh.lookAt(0, 0, 0);
            mesh.scale.y = len;
            const isPeak = (i % dataArray.length) === maxIdx && maxVal > 30;
            mesh.material.emissiveIntensity = isPeak ? 1.5 : 0.4 + v;
          });
          grp.rotation.y += 0.005;
          grp.rotation.x += 0.002;
        }
        else if (currentMode === 'tunnel') {
          grp.children.forEach((mesh) => {
            const u = mesh.userData;
            const v = dataArray[u.baseIdx % dataArray.length] / 255;
            const h = 1 + v * 25;
            mesh.scale.y = h;
            mesh.material.emissiveIntensity = 0.3 + v * 1.5;
            // 沿 Z 軸推進，循環回到後方
            mesh.position.z += 0.4 + bassPulse * 1.2;
            if (mesh.position.z > 50) {
              mesh.position.z -= 12 * 12;
            }
          });
          grp.rotation.z += 0.002;
        }
        else if (currentMode === 'helix') {
          grp.children.forEach((mesh) => {
            const u = mesh.userData;
            const v = dataArray[u.idx % dataArray.length] / 255;
            const r = u.radius + v * 8;
            const a = u.angle + t * 0.3;
            mesh.position.set(
              Math.cos(a + u.offset) * r,
              u.y,
              Math.sin(a + u.offset) * r
            );
            mesh.scale.setScalar(0.6 + v * 1.4);
            mesh.material.emissiveIntensity = 0.4 + v * 1.5;
          });
        }

        // 中央光源律動
        centerLight.intensity = 0.5 + bassPulse * 4;
        centerLight.color.setHSL((avgVol * 0.6 + t * 0.05) % 1, 0.9, 0.6);

        // 重拍時整體輕微抖動
        if (bassPulse > 0.55) {
          camera.position.x += (Math.random() - 0.5) * 0.4;
          camera.position.y += (Math.random() - 0.5) * 0.4;
        }
      }

      renderer.render(scene, camera);
    }
    animate();

    // ===== 視窗縮放 =====
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ===== 熱鍵 =====
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      switch (e.key) {
        case ' ':
          e.preventDefault();
          playBtn.click();
          break;
        case 'r':
        case 'R':
          camera.position.copy(initialCameraPos);
          controls.target.set(0, 0, 0);
          break;
        case 'a':
        case 'A':
          autoRotateBtn.click();
          break;
      }
    });
  </script>
</body>
</html>
